name: Deploy v2 to GitHub Pages

on:
  push:
    branches:
      - feature/app/v2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npx vite build

      - name: Checkout gh-pages content
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _gh_pages

      - name: Merge build into gh-pages content
        run: |
          rm -rf _gh_pages/appv2
          cp -r dist/ _gh_pages/appv2
          touch _gh_pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _gh_pages

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
