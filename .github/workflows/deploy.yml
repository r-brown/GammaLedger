# GitHub Actions workflow for GammaLedger GitHub Pages
#
# Builds blog post pages from Markdown sources, then deploys
# the full site to GitHub Pages.
#
# ┌─────────────────────────────────────────────────────────┐
# │  REQUIRED ONE-TIME SETUP                                │
# │                                                         │
# │  1. Go to repo Settings → Pages                        │
# │  2. Under "Build and deployment", set Source to:        │
# │     ★ "GitHub Actions"  (NOT "Deploy from a branch")   │
# │                                                         │
# │  Without this, the workflow runs but Pages still        │
# │  serves the raw branch — and generated blog posts       │
# │  will 404 because they are not committed to the repo.   │
# └─────────────────────────────────────────────────────────┘

name: Deploy to GitHub Pages

on:
  push:
    branches: ["gh-pages"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: pip install markdown

      - name: Build blog posts and sitemap
        run: python scripts/build-blog.py

      - name: Verify build output
        run: |
          echo "::group::Generated blog directories"
          ls -d blog/*/
          echo "::endgroup::"
          count=$(find blog -maxdepth 2 -name 'index.html' -not -path 'blog/index.html' | wc -l)
          echo "✓ Generated $count blog post pages"
          if [ "$count" -eq 0 ]; then
            echo "::error::No blog post pages were generated!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
