name: GammaLedger MCP — Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "MCP package version (for example, 1.2.3 or mcp-1.2.3)"
        required: true
        type: string
      release_notes:
        description: "Release notes (leave blank to auto-generate from commits)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: mcp-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  # ── 1. Pre-publish checks ────────────────────────────────────────────────────
  test:
    name: Pre-publish checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mcp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # needed so setuptools-scm can read the tag

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run python -m ruff check src tests

      - name: Format check (ruff)
        run: uv run python -m ruff format --check src tests

      - name: Type check (mypy)
        run: uv run python -m mypy src

      - name: Run tests
        run: uv run python -m pytest tests/ -v

  # ── 2. Build and publish to PyPI ─────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: read
    defaults:
      run:
        working-directory: mcp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${INPUT_VERSION#mcp-}"
          VERSION="${VERSION#v}"

          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid MCP release version: ${VERSION}" >&2
            exit 1
          fi

          echo "number=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=mcp-${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved MCP release version: ${VERSION}"
        working-directory: .

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: uv build
        env:
          # Inject version directly so setuptools-scm does not need the inner
          # git repo (mcp/.git is a nested repo, not visible to the CI checkout)
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.number }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp/dist/
          skip-existing: true   # safe re-run on transient failures

  # ── 3. Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${INPUT_VERSION#mcp-}"
          VERSION="${VERSION#v}"

          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid MCP release version: ${VERSION}" >&2
            exit 1
          fi

          echo "number=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=mcp-${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved MCP release version: ${VERSION}"

      - name: Build release body
        id: body
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
          VERSION: ${{ steps.version.outputs.number }}
        run: |
          BODY_FILE="$(mktemp)"

          if [ -n "${RELEASE_NOTES}" ]; then
            printf '%s\n\n' "${RELEASE_NOTES}" >> "${BODY_FILE}"
          fi

          cat >> "${BODY_FILE}" <<EOF
          ## GammaLedger MCP v${VERSION}

          | Registry | Package |
          |---|---|
          | PyPI | [\`gammaledger-mcp==${VERSION}\`](https://pypi.org/project/gammaledger-mcp/${VERSION}/) |

          ## Install

          \`\`\`bash
          # pip
          pip install gammaledger-mcp==${VERSION}

          # uvx (recommended - no install needed)
          uvx gammaledger-mcp --db-path ~/gammaledger.json

          # Claude Code
          claude mcp add gammaledger -- uvx gammaledger-mcp --db-path ~/gammaledger.json
          \`\`\`
          EOF

          echo "path=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.body.outputs.path }}
          generate_release_notes: ${{ inputs.release_notes == '' }}
          append_body: true
          target_commitish: ${{ github.sha }}
