name: GammaLedger MCP — Release

# Triggered by tags: mcp-1.2.3 or mcp-1.2.3-rc.1
on:
  push:
    tags:
      - "mcp-[0-9]+.[0-9]+.[0-9]+"      # mcp-1.2.3
      - "mcp-[0-9]+.[0-9]+.[0-9]+-*"    # mcp-1.2.3-rc.1, mcp-1.2.3-beta.2

permissions:
  contents: read
  id-token: write

concurrency:
  group: mcp-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Pre-publish checks ────────────────────────────────────────────────────
  test:
    name: Pre-publish checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mcp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # needed so setuptools-scm can read the tag

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run python -m ruff check src tests

      - name: Format check (ruff)
        run: uv run python -m ruff format --check src tests

      - name: Type check (mypy)
        run: uv run python -m mypy src

      - name: Run tests
        run: uv run python -m pytest tests/ -v

  # ── 2. Build and publish to PyPI ─────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: read
    defaults:
      run:
        working-directory: mcp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Strip the "mcp-" prefix to get the bare semver (e.g. mcp-1.2.3 → 1.2.3)
      - name: Derive version from tag
        id: version
        run: echo "number=${GITHUB_REF_NAME#mcp-}" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: uv build
        env:
          # Inject version directly so setuptools-scm does not need the inner
          # git repo (mcp/.git is a nested repo, not visible to the CI checkout)
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.number }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp/dist/
          skip-existing: true   # safe re-run on transient failures

  # ── 3. Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: version
        run: echo "number=${GITHUB_REF_NAME#mcp-}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## GammaLedger MCP v${{ steps.version.outputs.number }}

            | Registry | Package |
            |---|---|
            | PyPI | [`gammaledger-mcp==${{ steps.version.outputs.number }}`](https://pypi.org/project/gammaledger-mcp/${{ steps.version.outputs.number }}/) |

            ## Install

            ```bash
            # pip
            pip install gammaledger-mcp==${{ steps.version.outputs.number }}

            # uvx (recommended — no install needed)
            uvx gammaledger-mcp --db-path ~/gammaledger.json

            # Claude Code
            claude mcp add gammaledger -- uvx gammaledger-mcp --db-path ~/gammaledger.json
            ```
