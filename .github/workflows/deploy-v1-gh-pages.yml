name: Deploy v1 to GitHub Pages

# Push-based deploy for the feature/app/v1 branch.
# Publishes to gammaledger.com/appv1/ via a direct git push to the gh-pages branch —
# no GitHub Pages environment protection rules apply.
# NOTE: release-based deployments for this branch are also handled by the smart
# deploy-gh-pages.yml workflow on main (which reads target_commitish).

on:
  push:
    branches:
      - feature/app/v1

concurrency:
  group: pages-deploy-appv1
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        # --base ensures /appv1/ is baked into all asset URLs.
        run: npx vite build --base /appv1/

      - name: Checkout gh-pages content
        id: checkout-gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _gh_pages
        continue-on-error: true

      - name: Initialise gh-pages branch (first deploy only)
        if: steps.checkout-gh-pages.outcome == 'failure'
        run: |
          mkdir -p _gh_pages
          cd _gh_pages
          git init
          git checkout --orphan gh-pages
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Merge build into gh-pages content
        run: |
          rm -rf _gh_pages/appv1
          cp -r dist/ _gh_pages/appv1
          touch _gh_pages/.nojekyll

      - name: Commit and push to gh-pages
        run: |
          cd _gh_pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Deploy feature/app/v1 → /appv1/ ($(git -C .. rev-parse --short HEAD))"
          git push origin gh-pages
