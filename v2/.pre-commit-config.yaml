repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^v2/backend/
      - id: ruff-format
        files: ^v2/backend/

  - repo: local
    hooks:
      - id: backend-mypy
        name: backend mypy
        language: system
        files: ^v2/backend/.*\.py$
        pass_filenames: false
        entry: bash -c 'cd v2/backend && uv run mypy src'
      - id: backend-tests
        name: backend tests
        language: system
        files: ^v2/backend/.*\.py$
        pass_filenames: false
        entry: bash -c 'cd v2/backend && uv run pytest -q'
      - id: frontend-typecheck
        name: frontend typecheck
        language: system
        files: ^v2/frontend/.*\.(ts|tsx)$
        pass_filenames: false
        entry: bash -c 'cd v2/frontend && npm run typecheck'
